sftp:
  host: "localhost"
  port: 2222
  username: "testuser"
  password: "password"

spring:
  batch:
    job:
      name: "fileToKafkaJob"
      enabled: false
  datasource:
    url: jdbc:postgresql://localhost:5432/localdb
    username: postgres
    password: secret
    driver-class-name: "org.postgresql.Driver"
    hikari:
      schema: "tranaction_file_ingester"
  kafka:
    bootstrap-servers: "localhost:9092"
    properties:
      "[schema.registry.url]": "http://localhost:8081"
    client-id: ${project.name}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: io.confluent.kafka.serializers.KafkaAvroSerializer
    template:
      default-topic: ${outbound-channel.topic-name}

inbound-channel:
  remote-directory: "/upload"
  local-directory: "${java.io.tmpdir}${random.uuid}/sftp"
  filename-pattern: ".*\\.txt$"
  poller:
    fixed-delay: 5000

metadata-store:
  file-name-prefix: "remote:"

batch:
  chunk-size: 100

outbound-channel:
  topic-name: "eod-transaction-event"

liquibase:
  change-log: "classpath:db/changelog/db.changelog-master.yaml"